name: Task
description: A concrete unit of work that's neither a bug nor a new feature
labels: ["type:task", "status:triage"]
body:
  - type: textarea
    id: what
    attributes:
      label: What needs to be done?
      description: Describe the work. Be concrete.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How will we know this is finished?
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Affected component(s)
      placeholder: "benchmark, baselines, .github, ..."
    validations:
      required: false
