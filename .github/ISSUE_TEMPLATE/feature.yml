name: Feature request
description: Propose a new capability or enhancement
labels: ["type:feature", "status:triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's the current pain or gap? Who feels it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the API, UX, or design. A rough idea is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why is this proposal better?
    validations:
      required: false
  - type: input
    id: scope
    attributes:
      label: Affected component(s)
      placeholder: "benchmark, baselines, leaderboard, ..."
    validations:
      required: false
